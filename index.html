<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .logo { font-family: Arial Black; font-size: 60px; background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(255,215,0,0.3); letter-spacing: 3px; position: relative; }
  .logo::after { content: '🎰'; position: absolute; right: -50px; top: -10px; font-size: 40px; -webkit-text-fill-color: initial; }
  .subtitle { color: #666; font-family: Arial; font-size: 14px; text-align: center; letter-spacing: 8px; margin-top: -10px; }
</style>
</head>
<body>
<div>
  <div class="logo">FELIXBET</div>
  <div class="subtitle">APOSTAS & CASSINO</div>
</div>
</body>
</html>
